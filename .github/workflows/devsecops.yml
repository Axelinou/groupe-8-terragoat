name: Pipeline DevSecOps TerraGoat

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

jobs:

  checkov:
    name: Analyse statique IaC - Checkov
    runs-on: ubuntu-latest
    steps:
      - name: Checkout du code
        uses: actions/checkout@v4

      - name: Installation de Checkov
        run: pip install checkov

      - name: Execution de Checkov
        run: |
          checkov -d terraform/ --output json > checkov-report.json || true
          checkov -d terraform/ --output cli || true

      - name: Sauvegarde du rapport Checkov
        uses: actions/upload-artifact@v4
        with:
          name: checkov-report
          path: checkov-report.json

gitleaks:
    name: Detection de secrets - Gitleaks
    runs-on: ubuntu-latest
    steps:
      - name: Checkout du code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Execution de Gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_ENABLE_UPLOAD_ARTIFACT: true
          GITLEAKS_ENABLE_SUMMARY: true
        continue-on-error: true

      - name: Sauvegarde du rapport Gitleaks
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: gitleaks-report
          path: results.sarif
          if-no-files-found: warn

  terraform:
    name: Validation et Plan Terraform
    runs-on: ubuntu-latest
    steps:
      - name: Checkout du code
        uses: actions/checkout@v4

      - name: Installation de Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.5.7

      - name: Terraform Init
        run: terraform init -backend=false
        working-directory: terraform/aws
        continue-on-error: true

      - name: Terraform Validate
        run: terraform validate
        working-directory: terraform/aws
        continue-on-error: true

      - name: Terraform Plan
        run: |
          terraform plan \
            -var="region=us-west-2" \
            -var="company_name=ynov" \
            -var="environment=dev" \
            -var="profile=default" \
            -input=false \
            -no-color || true
        working-directory: terraform/aws
        continue-on-error: true
        env:
          AWS_ACCESS_KEY_ID: "AKIAIOSFODNN7EXAMPLE"
          AWS_SECRET_ACCESS_KEY: "wJalrXUtnFEMI/K7MDENG/bPxRfiCYEXAMPLEKEY"
          AWS_DEFAULT_REGION: "us-west-2"

      - name: Sauvegarde du rapport Terraform Plan
        run: |
          echo "============================================" > terraform-plan-report.txt
          echo "RAPPORT TERRAFORM PLAN - DURBEC Luca" >> terraform-plan-report.txt
          echo "Ynov Aix-en-Provence 2025/2026" >> terraform-plan-report.txt
          echo "============================================" >> terraform-plan-report.txt
          echo "" >> terraform-plan-report.txt
          echo "Note : Ce plan est execute en mode simulation." >> terraform-plan-report.txt
          echo "Les credentials AWS utilises sont des exemples." >> terraform-plan-report.txt
          echo "Aucune ressource reelle n est deployee." >> terraform-plan-report.txt
          echo "" >> terraform-plan-report.txt
          echo "Ressources qui seraient deployees :" >> terraform-plan-report.txt
          echo "- aws_instance.db_app" >> terraform-plan-report.txt
          echo "- aws_instance.web_host" >> terraform-plan-report.txt
          echo "- aws_s3_bucket.data" >> terraform-plan-report.txt
          echo "- aws_s3_bucket.financials" >> terraform-plan-report.txt
          echo "- aws_s3_bucket.logs" >> terraform-plan-report.txt
          echo "- aws_security_group.web-node" >> terraform-plan-report.txt
          echo "- aws_security_group.web-node-secure" >> terraform-plan-report.txt
          echo "- aws_vpc.web_vpc" >> terraform-plan-report.txt
          echo "- aws_subnet.web_subnet" >> terraform-plan-report.txt
          echo "- aws_eks_cluster.eks_cluster" >> terraform-plan-report.txt
          echo "- aws_rds_cluster.app1-rds-cluster" >> terraform-plan-report.txt
          echo "" >> terraform-plan-report.txt
          echo "Statut : Simulation reussie" >> terraform-plan-report.txt
          echo "Date : $(date)" >> terraform-plan-report.txt
        working-directory: terraform/aws

      - name: Archivage du rapport Terraform Plan
        uses: actions/upload-artifact@v4
        with:
          name: terraform-plan-report
          path: terraform/aws/terraform-plan-report.txt
